<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light only" />
  <meta name="theme-color" content="#F9FAFB" />
  <title>Panel de Recetas Médicas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: 'var(--color-primary)',
            secondary: 'var(--color-secondary)',
            accent: 'var(--color-accent)',
            neutral: 'var(--color-neutral)',
            'base-100': 'var(--color-base-100)',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --color-primary: #3B82F6;
      /* Blue 500 */
      --color-secondary: #10B981;
      /* Emerald 500 */
      --color-accent: #EC4899;
      /* Pink 500 */
      --color-neutral: #4B5563;
      /* Gray 600 */
      --color-base-100: #F9FAFB;
      /* Gray 50 */
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--color-base-100);
    }

    /* Force light theme - prevent dark mode */
    html {
      color-scheme: light only !important;
    }

    body {
      background-color: #F9FAFB !important;
      color: #111827 !important;
    }

    /* Ensure all text remains dark */
    * {
      color-scheme: light only !important;
    }

    /* Override any dark mode styles */
    @media (prefers-color-scheme: dark) {

      html,
      body {
        background-color: #F9FAFB !important;
        color: #111827 !important;
      }

      * {
        background-color: inherit !important;
        color: inherit !important;
      }
    }

    /* Ensure html2canvas captures the background color of elements */
    .prescription-preview-area {
      background-color: white !important;
      /* Or any desired background */
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/",
    "react": "https://esm.sh/react@^19.1.0",
    "react/": "https://esm.sh/react@^19.1.0/",
    "uuid": "https://esm.sh/uuid@^11.1.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <noscript>Necesitas habilitar JavaScript para ejecutar esta aplicación.</noscript>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
